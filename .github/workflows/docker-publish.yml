name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/semrels/semrel-registry:latest
            ghcr.io/semrels/semrel-registry:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/semrels/semrel-registry:buildcache
          cache-to: type=registry,ref=ghcr.io/semrels/semrel-registry:buildcache,mode=max

      - name: Make package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/SemRels/packages/container/semrel-registry \
            -d '{"visibility":"public"}'
