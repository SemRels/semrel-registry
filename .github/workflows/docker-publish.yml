name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry.semrel.io
        uses: docker/login-action@v3
        with:
          registry: registry.semrel.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            registry.semrel.io/semrel-registry:latest
            registry.semrel.io/semrel-registry:${{ github.sha }}
          cache-from: type=registry,ref=registry.semrel.io/semrel-registry:buildcache
          cache-to: type=registry,ref=registry.semrel.io/semrel-registry:buildcache,mode=max
