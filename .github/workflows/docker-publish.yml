name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'admin/**'
      - 'plugins.json'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/semrels/semrel-registry:latest
            ghcr.io/semrels/semrel-registry:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/semrels/semrel-registry:buildcache
          cache-to: type=registry,ref=ghcr.io/semrels/semrel-registry:buildcache,mode=max

  build-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./admin/Dockerfile
          push: true
          tags: |
            ghcr.io/semrels/semrel-registry-admin:latest
            ghcr.io/semrels/semrel-registry-admin:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/semrels/semrel-registry-admin:buildcache
          cache-to: type=registry,ref=ghcr.io/semrels/semrel-registry-admin:buildcache,mode=max
