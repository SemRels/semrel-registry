name: Sync plugins registry

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  repository_dispatch:
    types:
      - sync-plugins

permissions:
  contents: write

concurrency:
  group: sync-plugins
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync plugins.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLUGIN_SOURCE_OWNER: SemRels
        run: |
          node .github/scripts/sync-plugins.js \
            --plugins plugins.json \
            --schema schemas/plugin-metadata.json \
            --summary .github/.cache/sync-summary.json

      - name: Validate generated plugins registry
        run: node .github/scripts/validate-plugins.js plugins.json schemas/plugin-metadata.json

      - name: Publish workflow summary
        if: always()
        run: |
          node -e "const fs=require('fs'); const summaryPath='.github/.cache/sync-summary.json'; const summary=fs.existsSync(summaryPath)?JSON.parse(fs.readFileSync(summaryPath,'utf8')):{sourceOrganization:'SemRels',processedRepositories:0,processedReleases:0,syncedPlugins:0,newVersions:[],skippedReleases:[],warnings:['No sync summary was generated.']}; const lines=['# Plugin sync summary','', '- Source organization: '+(summary.sourceOrganization||'unknown'), '- Repositories scanned: '+(summary.processedRepositories||0), '- Processed releases: '+(summary.processedReleases||0), '- Synced plugins: '+(summary.syncedPlugins||0), '- New versions: '+((summary.newVersions||[]).length), '']; if ((summary.newVersions||[]).length) { lines.push('## New or updated versions',''); for (const item of summary.newVersions) lines.push('- '+item); lines.push(''); } if ((summary.skippedReleases||[]).length) { lines.push('## Skipped releases',''); for (const item of summary.skippedReleases) lines.push('- '+item); lines.push(''); } if ((summary.warnings||[]).length) { lines.push('## Warnings',''); for (const item of summary.warnings) lines.push('- '+item); lines.push(''); } fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));"

      - name: Commit and push plugins.json
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- plugins.json; then
            echo "No plugin registry changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json
          git commit -m "chore: sync plugins registry [skip ci]"
          git push origin HEAD:main