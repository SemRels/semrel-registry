services:
  postgres:
    image: postgres:16-alpine
    container_name: semrel-registry-postgres
    environment:
      POSTGRES_DB: semrel_registry
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d semrel_registry"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
